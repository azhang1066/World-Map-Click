kind = "web"
previewPath = "/"
title = "World Map"
version = "1.0.0"
id = "artifacts/world-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25624

[services.development]
run = "pnpm --filter @workspace/world-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/world-map", "run", "build" ]
publicDir = "artifacts/world-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25624"
BASE_PATH = "/"
